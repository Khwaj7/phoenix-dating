spring.application.name=phoenix-dating

# DataSource — PostgreSQL local (Postgres.app)
spring.datasource.url=jdbc:postgresql://localhost:5432/phoenix
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=phoenix
spring.datasource.password=phoenix
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway owns the schema — Hibernate validates only
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:changeme-dev-secret-changeme-dev-secret}
jwt.expiration-ms=3600000